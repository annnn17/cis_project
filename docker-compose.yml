services:
  db:
    image: postgres:15-alpine
    container_name: project_06-db
    environment:
      POSTGRES_DB: "notes_db_06"
      POSTGRES_USER: "notes_user_06"
      POSTGRES_PASSWORD: "password123"
    volumes:
      - pgdata_06:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5406:5432" # Проброс: командный порт СУБД наружу -> 5432 внутрь
    networks:
      - project_06-network

  backend:
    build:
      context: ./backend
    container_name: project_06-backend
    environment:
      DB_HOST: db # Имя сервиса БД в сети Compose
      DB_NAME: "notes_db_06"
      DB_USER: "notes_user_06"
      DB_PASS: "password123"
    ports:
      - "5006:5000" # Проброс: командный порт бэкенда наружу -> 5000 внутрь
    depends_on:
      - db
    networks:
      - project_06-network

  nginx:
    image: nginx:alpine
    container_name: project_06-nginx
    ports:
      - "8006:80" # Проброс: командный порт веб-сайта наружу -> 80 внутрь
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - project_06-network

  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: project_06-prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - promdata_06:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "9006:9090"
    depends_on:
      - backend
    networks:
      - project_06-network

  grafana:
    image: grafana/grafana:10.0.0
    container_name: project_06-grafana
    ports:
      - "3006:3000"
    volumes:
      - grafanadata_06:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - project_06-network

volumes:
  pgdata_06:
  promdata_06:
  grafanadata_06:

networks:
  project_06-network:
    name: project_06-network

